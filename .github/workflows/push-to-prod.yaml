name: push-to-prod.yaml
on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-docker:
    runs-on: ubuntu-latest
    outputs:
      container-tag: ${{steps.timestamp.outputs.container-tag}}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Docker Login GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Login Google Container Registry
        uses: docker/login-action@v4
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS  }}


      - name: Get PR Number
        id: timestamp
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM=$(gh pr list --search '${{github.sha}}' -s all --json number -q '.[] | .number' || echo "latest")
          TIMESTAMP=$(printf '%(%Y.%m.%d.%H%M%S)T\n' -1)
          if [[ -z "$PR_NUM" ]]; then
            PR_NUM="main"
          fi
          echo "container-tag=$PR_NUM.$TIMESTAMP" >> $GITHUB_OUTPUT

      - name: Docker Build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/terra-magma/terrastack-docs:latest,ghcr.io/terra-magma/terrastack-docs:${{ steps.timestamp.outputs.container-tag }}-pr${{ github.event.number }}
            ghcr.io/terra-magma/terrastack-docs:latest,ghcr.io/terra-magma/terrastack-docs:latest
            gcr.io/${{secrets.GCP_PROJECT_ID}}/terrastack-docs:${{ steps.timestamp.outputs.container-tag }}-pr${{ github.event.number }}
            gcr.io/${{secrets.GCP_PROJECT_ID}}/terrastack-docs:latest

      - name: Output Container Tag
        run: |
          echo "Container Tag: ${{ steps.timestamp.outputs.container-tag }}"

  google-cloud:
    runs-on: ubuntu-latest
    needs: build-docker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - id: 'deploy'
        uses: 'google-github-actions/deploy-cloudrun@v3'
        with:
          service: 'terrastack-docs'
          image: 'gcr.io/${{secrets.GCP_PROJECT_ID}}/terrastack-docs:${{ needs.build-docker.outputs.container-tag }}'

      - name: 'Use output'
        run: 'curl --fail --show-error --silent "${{ steps.deploy.outputs.url }}"'